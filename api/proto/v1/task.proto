syntax = "proto3";

package queue_service;
option go_package = "github.com/yourusername/gopher-queue/api/proto/v1";

service QueueService {

    // Clients use this to send a job
    rpc SubmitTask(TaskRequest) returns (TaskResponse);
    // Workers use this to ask for jobs
    rpc GetWork(WorkRequest) returns (WorkResponse);
    // Heartbeat communication
    rpc ReportStatus(stream WorkerUpdate) returns (stream ServerSignal);
}

/* SubmitTask */
message TaskRequest {
    string task_type = 1;
    bytes payload = 2;
    int32 priority = 3;
}
message TaskResponse {
    int32 task_id = 1;
    bool accepted = 2;
}

/* GetWork */
message WorkRequest {
    string worker_id = 1;
}
message WorkResponse {
    int32 task_id = 1;
    bytes payload = 2;
}

/* ReportStatus*/
enum TaskState {
    PENDING = 0;
    RUNNING = 1;
    COMPLETED = 2;
    FAILED = 3;
}
message WorkerUpdate {
    int32 task_id = 1;
    string worker_id = 2;
    float perc_complete = 3;
    TaskState curr_state = 4;
}
message ServerSignal {
    bool cancel = 1;
}